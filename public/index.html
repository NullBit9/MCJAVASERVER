<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MCJAVASERVER — Web Console</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topnav subtle">
    <div class="nav-inner">
      <div class="logo">MCJAVASERVER</div>
    </div>
  </header>

  <main class="center-hero">
    <div class="center-inner">
      <div id="auth" class="center-auth">
        <!-- Register (first visitor) -->
        <div id="registerBox" class="auth-card auth-register">
          <div class="auth-header">
            <h2>Register</h2>
            <p class="muted">Create the first administrator account</p>
          </div>
          <div class="auth-body">
            <div class="input-wrap"><input id="regUser" placeholder="username" autocomplete="username" /></div>
            <div class="input-wrap"><input id="regPass" type="password" placeholder="password" autocomplete="new-password" /></div>
            <div class="row"><button id="doRegister" class="btn primary large">Create account</button></div>
            <div id="regMsg" class="msg"></div>
          </div>
        </div>

        <!-- Login (hidden unless needed) -->
        <div id="loginBox" class="auth-card auth-login hidden">
          <div class="auth-header">
            <h2>Login</h2>
            <p class="muted">Sign in to manage the server</p>
          </div>
          <div class="auth-body">
            <div class="input-wrap"><input id="loginUser" placeholder="username" autocomplete="username" /></div>
            <div class="input-wrap"><input id="loginPass" type="password" placeholder="password" autocomplete="current-password" /></div>
            <div class="row"><button id="doLogin" class="btn large">Login</button></div>
            <div id="loginMsg" class="msg"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Admin console (unchanged, hidden by default) -->
  <section class="admin-wrap">
    <div id="admin" class="card hidden">
      <h2>Admin Console</h2>
      <div class="controls">
        <button id="startBtn" class="btn">Start Server</button>
        <button id="stopBtn" class="btn">Stop Server</button>
        <button id="seedBtn" class="btn">Get Seed</button>
      </div>
      <div id="console" class="console" aria-live="polite"></div>
      <div class="cmd-row">
        <input id="cmdInput" placeholder="enter server command (e.g. say hello)" />
        <button id="sendCmd" class="btn">Send</button>
      </div>
    </div>
  </section>

  <script src="/app.js"></script>
</body>
</html>
