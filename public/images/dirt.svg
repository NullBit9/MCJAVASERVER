<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Simple pixel-art dirt block approximation -->
  <rect width="64" height="64" fill="#6b4a2b" />
  <!-- lighter patches -->
  <rect x="6" y="8" width="8" height="8" fill="#7c5330" />
  <rect x="22" y="14" width="8" height="8" fill="#7c5330" />
  <rect x="40" y="6" width="10" height="10" fill="#7c5330" />
  <rect x="48" y="28" width="6" height="6" fill="#8a5b34" />
  <!-- grass top strip -->
  <rect x="0" y="0" width="64" height="12" fill="#66b24a" />
  <!-- small stones -->
  <rect x="12" y="36" width="6" height="6" fill="#9b8f85" />
  <rect x="34" y="44" width="5" height="5" fill="#9b8f85" />
</svg>
